# FINAL (refined) PROJECT SHOWCASE config — consumed by build_showcase.py.
#
# This is the curated version for the grader: 1-2 examples per topic instead
# of everything (advisor feedback). The full showcase_config.yaml build stays
# as the complete archive.
#
# Selection (approved 2026-07-19):
#   DSP walkthrough  -> Rihanna - Diamonds (Western) + Noa Kirel - Unicorn (Israeli)
#   Good transfers   -> Eminem - Lose Yourself + Ravid Plotnik - New Day
#   Broken examples  -> Metallica - Enter Sandman + Rihanna "sounds like machine"
#   Evaluation       -> 1-2 hand-picked figures per metric (not whole folders)
#
# Build (from MusicProject/):
#   .\ml_env\Scripts\python.exe .\build_showcase.py `
#       --config .\deliverables\showcase_config_final.yaml `
#       --out_dir .\project_showcase_final
