# version_Israeli_Artists.yaml — Version 1 (v1) full Israeli singer-songwriter set.
# SOLE input to `python -m preprocessing.derive_version --spec <this>` (DSP-only, Colab-safe).
# Basic-Pitch must already have run on the source pool.
#
# Drive layout assumed (see ../README.md "Israeli Data Pipeline"):
#   <drive_root>/SourcePool/<artist>/<album>/<song>/{<song>.wav, <song>.mid, augmented/...}
#   <drive_root>/versions/Israeli_Artists/processed_data/...   ← derive_version writes here
#
# Provenance: generated from SourcePool/source_pool_index.csv (ingest_status == ok),
# DEDUPLICATED by source URL to prevent train/val leakage. 10 rows were dropped:
#   - 9 duplicate-URL re-ingests (uf gozal, lo at lo, ani ohev otach, vidui,
#     boi, shir erev, kvar achshav, modeh ani)  -> kept first occurrence only
#   - 1 skipped entry (Yoni Rechter "haikar ze haromantika", 74-min playlist URL)
#   - "Lehakat HaNahal / shir lashalom" excluded here (it belongs to v2 military).
# Net: 88 unique songs across 13 artists.

version_id: 1
style_name: Israeli_Artists

# DSPConfig overrides — kept identical to project defaults so Israeli vs.
# Slakh mel tensors are interchangeable for the diffusion UNet.
dsp:
  sample_rate: 22050
  hop_length: 256
  n_fft: 1024
  n_mels: 80
  fmax: 8000
  segment_duration: 5.0   # → 430 mel frames per segment

# Offline augmentation policy. Tags emitted by
# `preprocessing.augmentation.DEFAULT_AUGMENTATIONS`
# (pitch_shift_+2, pitch_shift_-2, time_stretch_0.9, time_stretch_1.1).
# Set `include_augmented: false` on a song to skip its augmented variants.
augmentation_policy: default

# Held-out songs (D-set) — EXCLUDED from training in `preprocessing.split_dataset`.
# Names below match the `song_name` field of entries in `songs:` exactly.
held_out_songs:
  - oof gozal
  - mechakim lamashiach
  - eich ze shekochav

# ---- Songs to pull from SourcePool/ into this version ------------------------
# Each entry resolves to SourcePool/<artist>/<album>/<song_name>/
