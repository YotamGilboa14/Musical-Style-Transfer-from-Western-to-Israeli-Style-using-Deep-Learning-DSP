# TEMPLATE — fill the `songs:` list after Phase D1 ingest finishes.
# This file is the SOLE input to `python -m preprocessing.derive_version --spec <this>`
# (DSP-only, Colab-safe). Basic-Pitch must already have run on the source pool.
#
# Drive layout assumed (see ../README.md "Israeli Data Pipeline"):
#   <drive_root>/source_pool/<artist>/<album>/<song>/{<song>.wav, <song>.mid, augmented/...}
#   <drive_root>/versions/Israeli_Shalom_Arik/processed_data/...   ← derive_version writes here

version_id: 1
style_name: Israeli

# DSPConfig overrides — kept identical to the project defaults so Israeli vs.
# Slakh-sanity mel tensors are interchangeable for the diffusion UNet.
dsp:
  sample_rate: 22050
  hop_length: 256
  n_fft: 1024
  n_mels: 80
  fmax: 8000
  segment_duration: 5.0   # → 430 mel frames per segment

# Offline augmentation policy. The strings below are the augmentation tags
# emitted by `preprocessing.augmentation.DEFAULT_AUGMENTATIONS`
# (pitch_shift_+2, pitch_shift_-2, time_stretch_0.9, time_stretch_1.1).
# Set `include_augmented: false` on a song to skip its augmented variants.
augmentation_policy: default

# Held-out songs (D-set) — these names must also appear in `run_spec.yaml`
# under `songs:` and be EXCLUDED from training in `preprocessing.split_dataset`.
# Names below match the `song_name` field of entries in `songs:` exactly.
held_out_songs:
  - hachnisini tachat knafech
  - oof gozal
  - mechakim lamashiach
  - layla

# ---- Songs to pull from source_pool/ into this version -----------------------
# Each entry resolves to source_pool/<artist>/<album>/<song_name>/
