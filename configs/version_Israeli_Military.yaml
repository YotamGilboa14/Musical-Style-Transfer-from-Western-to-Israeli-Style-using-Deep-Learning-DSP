# version_Israeli_Military.yaml — Version 2 (v2) Israeli military-band (lehakot tzvaiyot) set.
# SOLE input to `python -m preprocessing.derive_version --spec <this>` (DSP-only, Colab-safe).
# Basic-Pitch must already have run on the source pool.
#
# Drive layout assumed (see ../README.md "Israeli Data Pipeline"):
#   <drive_root>/SourcePool/<artist>/<album>/<song>/{<song>.wav, <song>.mid, augmented/...}
#   <drive_root>/versions/Israeli_Military/processed_data/...   ← derive_version writes here
#
# Provenance: generated from batch_songs_military.csv (113 unique songs, 18 ensembles),
# deduplicated by source URL (0 duplicates after CSV cleanup). The actual ingest writes
# its manifest to SourcePool/source_pool_index_military.csv.
# RECONCILED 2026-06-05: ingest completed ok=109 skipped=4 failed=0 (113/113). All 113
# entries verified present in source_pool_index_military.csv with .wav+.mid on Drive and
# augmented_count==4. No pruning needed — this spec matches the source pool exactly.

version_id: 2
style_name: Israeli_Military

# DSPConfig overrides — identical to project defaults (interchangeable mel tensors).
dsp:
  sample_rate: 22050
  hop_length: 256
  n_fft: 1024
  n_mels: 80
  fmax: 8000
  segment_duration: 5.0   # → 430 mel frames per segment

# Offline augmentation policy. Tags emitted by
# `preprocessing.augmentation.DEFAULT_AUGMENTATIONS`
# (pitch_shift_+2, pitch_shift_-2, time_stretch_0.9, time_stretch_1.1).
augmentation_policy: default

# Held-out songs (D-set) — EXCLUDED from training in `preprocessing.split_dataset`.
# Names below match the `song_name` field of entries in `songs:` exactly.
held_out_songs:
  - hareut
  - givat hatchmoshet

